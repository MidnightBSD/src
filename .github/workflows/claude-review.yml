name: Claude Code Review

on:
  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Review
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          track_progress: true # Forces tag mode with tracking comments
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            This is the MidnightBSD operating system source tree.
            Review for: correctness bugs, malloc/free symmetry, bounds checking,
            style(9) compliance (8-space tabs, 80-col), and security issues.
            Flag any assembly or contrib/mksh changes — AI review is prohibited for those.
            Be concise. Focus on high-confidence issues only.
