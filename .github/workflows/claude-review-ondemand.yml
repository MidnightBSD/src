name: Claude Code Review (On Demand)

on:
  issue_comment:
    types: [ created ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Code Review
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/code-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/code-review"
          post_as_pr_comments: true
          custom_instructions: |
            This is the MidnightBSD operating system source tree.
            Review for: correctness bugs, malloc/free symmetry, bounds checking,
            style(9) compliance (8-space tabs, 80-col), and security issues.
            Flag any assembly or contrib/mksh changes — AI review is prohibited for those.
            Be concise. Focus on high-confidence issues only.
